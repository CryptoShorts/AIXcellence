<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIXcellence — Stay Ahead of AI Disruption</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary:    #07090f;
      --bg-elevated:   #0d1018;
      --bg-surface:    #12161f;
      --bg-card:       #181d2a;
      --border:        rgba(255,255,255,0.07);
      --border-accent: rgba(99,102,241,0.35);
      --accent-1:      #6366f1;
      --accent-2:      #06b6d4;
      --accent-grad:   linear-gradient(135deg, #6366f1 0%, #06b6d4 100%);
      --accent-glow:   rgba(99,102,241,0.25);
      --text-primary:  #f0f2ff;
      --text-secondary:rgba(240,242,255,0.65);
      --text-muted:    rgba(240,242,255,0.38);
      --success:       #10b981;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── HEADER ─── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(7,9,15,0.88);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; flex-shrink: 0;
    }
    .logo-icon {
      width: 34px; height: 34px;
      background: var(--accent-grad);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; font-weight: 800; color: #fff;
      letter-spacing: -1px;
    }
    .logo-text {
      font-size: 18px; font-weight: 700; color: var(--text-primary);
      letter-spacing: -0.4px;
    }
    .logo-text span {
      background: var(--accent-grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header-right {
      display: flex; align-items: center; gap: 12px;
    }

    /* Language toggle */
    .lang-toggle {
      display: flex; align-items: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-accent);
      border-radius: 8px;
      overflow: hidden;
    }
    .lang-btn {
      padding: 6px 13px;
      font-size: 12px; font-weight: 700;
      color: var(--text-muted);
      cursor: pointer;
      background: transparent;
      border: none;
      letter-spacing: 0.5px;
      transition: all 0.18s ease;
      font-family: inherit;
    }
    .lang-btn.active {
      background: var(--accent-grad);
      color: #fff;
    }
    .lang-btn:not(.active):hover { color: var(--text-primary); background: rgba(99,102,241,0.08); }

    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 20px;
      border-radius: 8px;
      font-size: 13.5px; font-weight: 600;
      cursor: pointer; text-decoration: none;
      transition: all 0.2s ease;
      border: none; white-space: nowrap;
    }
    .btn-primary {
      background: var(--accent-grad);
      color: #fff;
      box-shadow: 0 4px 20px rgba(99,102,241,0.3);
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 28px rgba(99,102,241,0.4); }

    /* ─── HERO ─── */
    .hero {
      padding: 80px 40px 72px;
      text-align: center;
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(99,102,241,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(6,182,212,0.10) 0%, transparent 60%);
      pointer-events: none;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 7px;
      background: rgba(99,102,241,0.12);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 999px;
      padding: 5px 14px;
      font-size: 12px; font-weight: 600;
      color: #a5b4fc;
      letter-spacing: 0.5px; text-transform: uppercase;
      margin-bottom: 24px;
    }
    .hero-badge .dot { width: 7px; height: 7px; background: #6366f1; border-radius: 50%; animation: pulse 2s ease infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.4)} }

    h1 {
      font-size: clamp(38px, 5.5vw, 64px);
      font-weight: 800; line-height: 1.10;
      letter-spacing: -2px; max-width: 820px;
      margin: 0 auto 20px; color: var(--text-primary);
    }
    h1 .gradient-text {
      background: var(--accent-grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero-sub {
      font-size: 17px; color: var(--text-secondary);
      max-width: 580px; margin: 0 auto 36px;
      font-weight: 400; line-height: 1.7;
    }
    .hero-cta-row {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      flex-wrap: wrap;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border-accent);
      color: var(--text-primary); padding: 11px 22px;
    }
    .btn-outline:hover { background: rgba(99,102,241,0.08); border-color: rgba(99,102,241,0.6); }
    .btn-lg { padding: 13px 28px; font-size: 15px; }

    /* ─── STAT BAR ─── */
    .stat-bar {
      background: var(--bg-elevated);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 32px 40px;
      display: flex; justify-content: center; gap: 0; flex-wrap: wrap;
    }
    .stat-item {
      flex: 1; min-width: 180px; max-width: 240px;
      text-align: center; padding: 16px 24px; position: relative;
    }
    .stat-item:not(:last-child)::after {
      content: ''; position: absolute; right: 0; top: 20%; height: 60%;
      width: 1px; background: var(--border);
    }
    .stat-number {
      font-size: 38px; font-weight: 800; letter-spacing: -2px;
      background: var(--accent-grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      display: block; line-height: 1.1;
    }
    .stat-label { font-size: 13px; color: var(--text-secondary); margin-top: 6px; line-height: 1.4; }

    /* ─── SECTION ─── */
    .section { padding: 72px 40px; max-width: 1060px; margin: 0 auto; }
    .section-label {
      font-size: 11.5px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase;
      background: var(--accent-grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    h2 {
      font-size: clamp(26px, 3.5vw, 36px); font-weight: 700;
      letter-spacing: -1px; line-height: 1.18; margin-bottom: 14px;
    }
    .section-intro { font-size: 16px; color: var(--text-secondary); max-width: 560px; margin-bottom: 48px; line-height: 1.7; }

    /* ─── PROBLEM ─── */
    .problem-strip { background: var(--bg-elevated); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .problem-inner {
      max-width: 1060px; margin: 0 auto; padding: 52px 40px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: center;
    }
    .problem-text h2 { margin-bottom: 12px; }
    .problem-text p { color: var(--text-secondary); font-size: 15.5px; line-height: 1.75; }
    .problem-list { display: flex; flex-direction: column; gap: 14px; }
    .problem-item {
      display: flex; align-items: flex-start; gap: 12px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px 18px; transition: border-color 0.2s;
    }
    .problem-item:hover { border-color: rgba(99,102,241,0.35); }
    .problem-icon {
      width: 32px; height: 32px; flex-shrink: 0;
      background: rgba(99,102,241,0.1); border-radius: 8px;
      display: flex; align-items: center; justify-content: center; font-size: 15px;
    }
    .problem-item-text { font-size: 14px; color: var(--text-secondary); line-height: 1.5; }
    .problem-item-text strong { color: var(--text-primary); font-weight: 600; display: block; margin-bottom: 2px; }

    /* ─── PILLARS ─── */
    .pillars-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .pillar-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 14px; padding: 28px 24px;
      transition: all 0.25s ease; position: relative; overflow: hidden;
    }
    .pillar-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 3px; background: var(--accent-grad); opacity: 0; transition: opacity 0.25s;
    }
    .pillar-card:hover { border-color: rgba(99,102,241,0.3); transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.3); }
    .pillar-card:hover::before { opacity: 1; }
    .pillar-icon {
      width: 44px; height: 44px; background: rgba(99,102,241,0.12);
      border: 1px solid rgba(99,102,241,0.2); border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; margin-bottom: 18px;
    }
    .pillar-title { font-size: 17px; font-weight: 700; margin-bottom: 10px; letter-spacing: -0.3px; }
    .pillar-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.65; margin-bottom: 18px; }
    .pillar-tags { display: flex; flex-wrap: wrap; gap: 7px; }
    .tag {
      font-size: 11.5px; font-weight: 600;
      background: rgba(99,102,241,0.08); border: 1px solid rgba(99,102,241,0.18);
      color: #a5b4fc; border-radius: 5px; padding: 3px 9px; letter-spacing: 0.2px;
    }

    /* ─── DIFF ─── */
    .diff-strip { background: var(--bg-elevated); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .diff-inner { max-width: 1060px; margin: 0 auto; padding: 64px 40px; }
    .diff-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; margin-top: 40px; }
    .diff-item {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 20px 22px; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 12px; transition: border-color 0.2s;
    }
    .diff-item:hover { border-color: rgba(6,182,212,0.3); }
    .diff-check {
      width: 26px; height: 26px; flex-shrink: 0;
      background: rgba(6,182,212,0.1); border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; color: #06b6d4; margin-top: 1px;
    }
    .diff-content h4 { font-size: 14.5px; font-weight: 600; margin-bottom: 4px; }
    .diff-content p { font-size: 13.5px; color: var(--text-secondary); line-height: 1.55; }

    /* ─── CTA ─── */
    .cta-section {
      padding: 72px 40px; text-align: center;
      position: relative; overflow: hidden;
    }
    .cta-section::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 70% 80% at 50% 120%, rgba(6,182,212,0.12) 0%, transparent 65%),
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(99,102,241,0.10) 0%, transparent 55%);
      pointer-events: none;
    }
    .cta-card {
      max-width: 640px; margin: 0 auto;
      background: var(--bg-card); border: 1px solid rgba(99,102,241,0.25);
      border-radius: 20px; padding: 52px 48px;
      position: relative; box-shadow: 0 0 60px rgba(99,102,241,0.08);
    }
    .cta-card h2 { margin-bottom: 12px; }
    .cta-card p { font-size: 16px; color: var(--text-secondary); margin-bottom: 32px; line-height: 1.7; }
    .cta-steps { display: flex; justify-content: center; gap: 0; margin-bottom: 32px; flex-wrap: wrap; }
    .cta-step { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-secondary); }
    .cta-step .num {
      width: 22px; height: 22px; background: rgba(99,102,241,0.15);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #a5b4fc;
    }
    .cta-divider { width: 24px; height: 1px; background: var(--border); margin: 0 8px; }

    /* ─── FOOTER ─── */
    footer {
      border-top: 1px solid var(--border); padding: 24px 40px;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
    }
    .footer-brand { display: flex; align-items: center; gap: 9px; font-size: 14px; color: var(--text-secondary); }
    .footer-tagline { font-size: 13px; color: var(--text-muted); font-style: italic; }
    .footer-links { display: flex; gap: 20px; }
    .footer-links a { font-size: 13px; color: var(--text-muted); text-decoration: none; }
    .footer-links a:hover { color: var(--text-secondary); }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      header { padding: 0 20px; }
      .hero { padding: 56px 20px 52px; }
      .stat-bar { padding: 24px 20px; }
      .section { padding: 52px 20px; }
      .problem-inner { grid-template-columns: 1fr; padding: 40px 20px; gap: 32px; }
      .pillars-grid { grid-template-columns: 1fr; }
      .diff-inner { padding: 48px 20px; }
      .diff-grid { grid-template-columns: 1fr; }
      .cta-section { padding: 52px 20px; }
      .cta-card { padding: 36px 28px; }
      footer { padding: 20px; flex-direction: column; align-items: flex-start; }
      .header-right { gap: 8px; }
      .btn.btn-primary { display: none; }
    }
  </style>
</head>
